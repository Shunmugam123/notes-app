apiVersion: deploy.cloud.google.com/v1
kind: DeliveryPipeline
metadata:
  name: gemini-notes-app-pipeline
description: Main application delivery pipeline
serialPipeline:
  stages:
    - targetId: dev-cloudrun-target
      profiles: []
---
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: dev-cloudrun-target
description: Cloud Run development target
run:
  location: us-central1   # just the region, not projects/${PROJECT_ID}