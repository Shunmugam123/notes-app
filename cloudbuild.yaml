steps:
# Step 1: Build the Docker image
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'build',
      '-t',
      'us-central1-docker.pkg.dev/$PROJECT_ID/notes-app/gemini-notes-app:$COMMIT_SHA',
      '.'
    ]

# Step 2: Push the Docker image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'push',
      'us-central1-docker.pkg.dev/$PROJECT_ID/notes-app/gemini-notes-app:$COMMIT_SHA'
    ]

# Step 3: Echo the release name for debugging
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
    - '-c'
    - 'echo "Generated release name: rel-${SHORT_SHA}"'

# Step 4: Create a Cloud Deploy release
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'gcloud'
  args:
    - 'deploy'
    - 'releases'
    - 'create'
    - 'rel-${SHORT_SHA}'
    - '--delivery-pipeline=gemini-notes-app-pipeline'
    - '--region=us-central1'
    - '--skaffold-file=skaffold.yaml'
    - '--images=gemini-notes-app=us-central1-docker.pkg.dev/$PROJECT_ID/notes-app/gemini-notes-app:$COMMIT_SHA'
    - '--description=Cloud Build automated release'

images:
- 'us-central1-docker.pkg.dev/$PROJECT_ID/notes-app/gemini-notes-app:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
