steps:
# Step 1: Build the Docker image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/gemini-notes-app:$COMMIT_SHA', '.']

# Debugging step: Print the image name
- name: 'bash'
  args: ['-c', 'echo "Attempting to push image: us-central1-docker.pkg.dev/$PROJECT_ID/gemini-notes-app:$COMMIT_SHA"']

# Step 2: Push the Docker image to Google Container Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/gemini-notes-app:$COMMIT_SHA']



# Step 3: Create a Cloud Deploy release
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'gcloud'
  args:
  - 'deploy'
  - 'releases'
  - 'create'
  - 'rel-${BUILD_ID}' # Unique release name
  - '--delivery-pipeline=gemini-notes-app-pipeline' # Name of the delivery pipeline
  - '--region=us-central1' # Region where the delivery pipeline is
  - '--images=gemini-notes-app=gcr.io/$PROJECT_ID/gemini-notes-app:$COMMIT_SHA'
  - '--description=Cloud Build automated release'

images:
- 'us-central1-docker.pkg.dev/$PROJECT_ID/gemini-notes-app:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY