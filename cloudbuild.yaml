steps:
# Step 1: Build the Docker image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/gemini-notes-app:$COMMIT_SHA', '.']
  dir: 'notes-app'

# Step 2: Push the Docker image to Google Container Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/gemini-notes-app:$COMMIT_SHA']

# Step 3: Deploy the image to Cloud Run
# Replace [SERVICE_NAME] with your desired Cloud Run service name
# Replace [REGION] with your desired GCP region (e.g., us-central1)
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'gcloud'
  args:
  - 'run'
  - 'deploy'
  - 'gemini-notes-app' # Replace with your service name
  - '--image'
  - 'gcr.io/$PROJECT_ID/gemini-notes-app:$COMMIT_SHA'
  - '--region'
  - 'us-central1' # Replace with your desired region
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated' # Or --no-allow-unauthenticated if authentication is required

images:
- 'gcr.io/$PROJECT_ID/gemini-notes-app:$COMMIT_SHA'